name: Pipeline CI Simples

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  test:
    name: Testes Node.js
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm install

      - name: Executar testes
        run: npm test
