name: Pipeline CI - Testes Mocha

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  testes:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Criar pasta de relatórios
        run: mkdir -p reports

      - name: Rodar testes
        run: npm test

      - name: Upload relatório de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes-${{ matrix.node-version }}
          path: reports/junit.xml
